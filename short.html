<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shorts</title>
  <link rel="icon" type="image/png" href="./Untitled.png">
  <link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body>

  <header class="topbar">
    <div class="left">
      <a class="brand" href="/index.html">
      <img className="ytLogo" src="/image.png" alt="YouTube">
      
    </a>
    </div>
    <div class="right"></div>

  <!-- App Layout -->
  <div class="layout">

    <aside class="sidebar">

    <main class="main">

      <div class="shortsFeed">
